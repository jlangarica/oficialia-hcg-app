<!-- Paso 4: Validación y Metadatos -->
<section id="step-4" class="wizard-step" aria-hidden="true">
  <div class="step-header">
    <h2>Validar Metadatos</h2>
    <p>Revise la información extraída antes de archivar.</p>
  </div>

  <div class="form-grid">
    <!-- Clasificación -->
    <div class="form-group">
      <label for="classSelect">Clasificación</label>
      <select id="classSelect" class="glass-input">
        <option value="">Seleccione...</option>
        <option value="Entrante">Entrante</option>
        <option value="Saliente">Saliente</option>
        <option value="Interno">Interno</option>
      </select>
    </div>

    <!-- Fecha -->
    <div class="form-group">
      <label for="fechaInput">Fecha del Documento</label>
      <input type="date" id="fechaInput" class="glass-input">
    </div>

    <!-- Remitente -->
    <div class="form-group full-width">
      <label for="shake-input">Remitente / Destinatario</label>
      <input type="text" id="shake-input" class="glass-input" placeholder="Nombre de la entidad o persona">
      <div id="shake-warn" class="input-warning" style="display:none">
        <span class="material-symbols-outlined">warning</span>
        <span>Verifique la ortografía del nombre</span>
      </div>
    </div>

    <!-- Asunto -->
    <div class="form-group full-width">
      <label for="asuntoInput">Asunto</label>
      <textarea id="asuntoInput" class="glass-input" rows="3" placeholder="Descripción breve del contenido"></textarea>
    </div>

    <!-- Folio (Solo lectura, se llena al guardar) -->
    <div class="form-group">
      <label for="folioInput">Folio Asignado</label>
      <input type="text" id="folioInput" class="glass-input" readonly placeholder="Se genera al guardar">
    </div>
  </div>

  <div class="actions-row">
    <button class="glass-btn ghost" onclick="goToStep(3)">Atrás</button>
    <!-- MODIFICADO: onclick cambia de goToStep(5) a handleSaveDocument() -->
    <button class="glass-btn primary" onclick="handleSaveDocument()">
      <span class="material-symbols-outlined">save</span>
      Guardar Registro
    </button>
  </div>
</section>
