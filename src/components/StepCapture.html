<!-- STEP 1: CAPTURA -->
<section class="step-view active" id="step-1">
  <div class="glass-card capture-card" data-stagger>
    <div id="captureStatusBadge" class="capture-status-badge disconnected" style="margin-bottom:16px;">
      <span class="badge-dot"></span>
      <span id="captureStatusText">Agente Fuera de Línea</span>
    </div>

    <h1>Preparar Documento</h1>
    <p class="subtitle">Coloque los documentos en el escáner o cargue un PDF existente para procesar.</p>

    <!-- Botón Principal: Digitalización por Hardware -->
    <button class="scan-action is-disabled" id="scanActionButton" onclick="handleStartScan()">
      <div class="scan-icon" id="scanActionIcon">
        <span class="material-symbols-outlined">scanner</span>
      </div>
      <span class="scan-label" id="scanActionLabel">Iniciar Digitalización Física</span>
      <span class="scan-hint" id="scanActionHint">Detección automática A4 / Letter</span>
    </button>

    <!-- Barra de progreso de escaneo -->
    <div class="scan-progress-track" id="scanProgressTrack" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progreso de escaneo" aria-describedby="scanProgressText">
      <div class="scan-progress-fill" id="scanProgressFill" aria-hidden="true"></div>
    </div>
    <div class="scan-progress-text" id="scanProgressText">Progreso: 0%</div>

    <!-- Opción secundaria: Cargar PDF previo -->
    <div style="margin-top:12px;" data-stagger>
      <label class="file-upload-label is-disabled" id="fileUploadLabel">
        <span class="material-symbols-outlined">upload_file</span>
        <span>Cargar PDF previo (Validación sin escáner)</span>
        <input type="file" accept=".pdf" id="fileUploadInput" style="display:none;">
      </label>
    </div>

    <!-- Opciones de hardware -->
    <div class="scan-options" data-stagger>
      <div class="duplex-group">
        <input type="checkbox" class="apple-switch" checked id="duplexSwitch">
        <label class="duplex-label" for="duplexSwitch">Ambos lados</label>
      </div>
      <div class="dpi-group">
        <span class="dpi-label" id="dpiLabel">Resolución</span>
        <select class="apple-input" id="dpiSelect" style="width:auto;padding:6px 32px 6px 12px;font-size:12px;cursor:pointer;" aria-labelledby="dpiLabel">
          <option value="150">150 DPI</option>
          <option value="300" selected>300 DPI</option>
          <option value="400">400 DPI</option>
          <option value="600">600 DPI</option>
        </select>
      </div>
    </div>
    <div id="scanErrorContainer"></div>
  </div>
</section>
